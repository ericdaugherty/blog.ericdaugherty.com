{{ define "main" }}
{{ range first 5 .Site.RegularPages }}
  <article class="post-summary">
    <h2 class="post-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
    <p class="blogdate">{{ .Date.Format "January 2, 2006" }}</p>
    {{ .Summary }}
    {{ if .Truncated }}<p class="read-more"><a href="{{ .RelPermalink }}">Read More</a></p>{{ end }}
  </article>
{{ end }}
{{ end }}
